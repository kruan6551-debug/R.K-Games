<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>R.K Games - Car Racing 3D</title>
  <link rel="manifest" href="manifest.json">
  <style> * { margin: 0; padding: 0; } body { overflow: hidden; background: #000; } #watermark { position: absolute; bottom: 10px; right: 10px; color: rgba(255,255,255,0.3); font-size: 18px; font-weight: bold; z-index: 100; } </style>
  <script type="importmap">{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js","cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"}}</script>
</head>
<body>
  <div id="watermark">R.K Games</div>
  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';
    const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer(); renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
    const world = new CANNON.World({gravity: new CANNON.Vec3(0,-9.82,0)});
    const chao = new CANNON.Body({mass:0, shape:new CANNON.Plane()}); chao.quaternion.setFromEuler(-Math.PI/2,0,0); world.addBody(chao);
    const geo = new THREE.BoxGeometry(2,1,4); const mat = new THREE.MeshBasicMaterial({color:0xff0000}); const carro = new THREE.Mesh(geo,mat); scene.add(carro);
    scene.add(new THREE.AmbientLight(0xffffff,1)); camera.position.set(0,5,-10); camera.lookAt(0,0,0);
    function animar(){ requestAnimationFrame(animar); world.step(1/60); renderer.render(scene,camera); } animar();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
